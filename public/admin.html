<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARBIMINE Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-900 text-white">
  <header class="bg-red-600 text-white p-4 flex justify-between items-center">
    <h1 class="font-bold text-xl">🚀 ARBIMINE ADMIN</h1>
    <button onclick="logout()" class="bg-black px-3 py-1 rounded text-sm">Logout</button>
  </header>

  <div class="p-4">
    <div class="mb-6">
      <h2 class="text-xl font-bold text-yellow-500 mb-3">Pending Payments</h2>
      <div id="pendingList" class="space-y-3">
        <p class="text-gray-400">Loading...</p>
      </div>
    </div>

    <div>
      <h2 class="text-xl font-bold text-yellow-500 mb-3">All Opportunities - Admin View</h2>
      <div id="adminArbs" class="space-y-2">
        <p class="text-gray-400">Loading...</p>
      </div>
    </div>
  </div>

  <script>
    // Check admin access
    fetch('/api/me').then(res => res.json()).then(user => {
      if (!user.isAdmin) {
        alert('Admin access only');
        window.location.href = '/';
      } else {
        loadPending();
        loadArbs();
      }
    });

    async function loadPending() {
      const res = await fetch('/api/admin/pending-payments');
      const users = await res.json();
      const container = document.getElementById('pendingList');
      
      if (users.length === 0) {
        container.innerHTML = '<p class="text-gray-400">No pending payments</p>';
        return;
      }

      container.innerHTML = users.map(u => `
        <div class="bg-slate-800 p-4 rounded-lg">
          <div class="flex justify-between items-start mb-2">
            <div>
              <p class="font-bold">${u.name}</p>
              <p class="text-sm text-gray-400">${u.email}</p>
              <p class="text-sm">Plan: <b class="text-yellow-500">${u.paymentRequest.plan}</b></p>
              <p class="text-sm">M-Pesa: <b>${u.paymentRequest.mpesaCode}</b></p>
              <p class="text-sm">Phone: <b>${u.paymentRequest.phone}</b></p>
              <p class="text-xs text-gray-500">${new Date(u.paymentRequest.requestedAt).toLocaleString()}</p>
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="approvePayment('${u._id}')" class="bg-green-600 px-4 py-2 rounded font-bold text-sm">APPROVE</button>
            <button onclick="rejectPayment('${u._id}')" class="bg-red-600 px-4 py-2 rounded font-bold text-sm">REJECT</button>
          </div>
        </div>
      `).join('');
    }

    async function approvePayment(userId) {
      if (!confirm('Approve this payment?')) return;
      await fetch('/api/admin/approve-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId })
      });
      loadPending();
    }

    async function rejectPayment(userId) {
      if (!confirm('Reject this payment?')) return;
      await fetch('/api/admin/reject-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId })
      });
      loadPending();
    }

    async function loadArbs() {
      const res = await fetch('/api/get-arbitrage-data');
      const { opportunities } = await res.json();
      document.getElementById('adminArbs').innerHTML = opportunities.map(arb => `
        <div class="bg-slate-800 p-3 rounded flex justify-between">
          <span>${arb.pair} - ${arb.buyExchange} → ${arb.sellExchange}</span>
          <span class="text-green-500 font-bold">${arb.spread}%</span>
        </div>
      `).join('');
    }

    function logout() {
      fetch('/api/logout', { method: 'POST' }).then(() => window.location.href = '/');
    }

    // Auto-refresh every 30s
    setInterval(() => { loadPending(); loadArbs(); }, 30000);
  </script>
</body>
</html>
