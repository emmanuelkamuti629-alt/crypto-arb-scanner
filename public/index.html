<!DOCTYPE html>
<html>
<head>
  <title>ArbiMine Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui; background: #0a0a0a; color: #fff; margin: 0; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 20px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; cursor: pointer; }
  .card:hover { border-color: #4ade80; transform: translateY(-2px); }
  .spread { font-size: 24px; font-weight: bold; color: #4ade80; }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
  .modal-content { background: #1a1a1a; margin: 2% auto; padding: 24px; width: 90%; max-width: 700px; border-radius: 12px; }
  .close { float: right; font-size: 32px; cursor: pointer; color: #999; }
  .close:hover { color: #fff; }
   button { background: #4ade80; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <h1>ArbiMine Live Scanner</h1>
  <button onclick="loadOpps()">Refresh</button>
  <div id="opportunities" class="grid"></div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 id="modalTitle"></h2>
      <div id="modalStats"></div>
      <canvas id="spreadChart" height="100"></canvas>
    </div>
  </div>

<script>
let chart;
const token = localStorage.getItem('token'); // Your auth token

async function loadOpps() {
  const res = await fetch('/api/scan');
  const data = await res.json();
  const grid = document.getElementById('opportunities');
  if (!data.opportunities.length) {
    grid.innerHTML = '<p style="color:#999">No opportunities >1% right now. Scanning...</p>';
    return;
  }
  grid.innerHTML = data.opportunities.map(o => `
    <div class="card" onclick="showDetails('${o.coin}','${o.buyExchange}','${o.sellExchange}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong style="font-size:18px">${o.coin}</strong>
        <span class="spread">${o.spreadPercent}%</span>
      </div>
      <div style="margin-top:12px;color:#999;font-size:14px">
        Buy: ${o.buyExchange} $${o.buyPrice}<br>
        Sell: ${o.sellExchange} $${o.sellPrice}<br>
        Profit: $${o.spread}
      </div>
    </div>
  `).join('');
}

async function showDetails(coin, buy, sell) {
  const res = await fetch(`/api/coin-details?coin=${coin}&buy=${buy}&sell=${sell}`);
  const d = await res.json();
  
  document.getElementById('modalTitle').textContent = `${coin}: ${buy} → ${sell}`;
  document.getElementById('modalStats').innerHTML = `
    <p><b>Current Spread:</b> ${d.spreadPercent.toFixed(2)}% ($${d.spread.toFixed(4)})</p>
    <p><b>Buy:</b> $${d.buyPrice} on ${buy}</p>
    <p><b>Sell:</b> $${d.sellPrice} on ${sell}</p>
    <p><b>24h Volume:</b> ${d.volume24h?.toLocaleString() || 'N/A'}</p>
    <h3>Order Book Preview</h3>
    <div style="display:flex;gap:20px">
      <div><b>${buy} Bids:</b><br>${d.buyOrderBook.map(o=>`$${o[0]} x ${o[1]}`).join('<br>')}</div>
      <div><b>${sell} Asks:</b><br>${d.sellOrderBook.map(o=>`$${o[0]} x ${o[1]}`).join('<br>')}</div>
    </div>
  `;
  
  if (chart) chart.destroy();
  const ctx = document.getElementById('spreadChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: d.history.map(h => new Date(h.time).toLocaleTimeString()),
      datasets: [{ 
        label: 'Spread %', 
        data: d.history.map(h => h.spread), 
        borderColor: '#4ade80', 
        backgroundColor: 'rgba(74, 222, 128, 0.1)',
        tension: 0.3,
        fill: true
      }]
    },
    options: { 
      plugins: { legend: { display: false } }, 
      scales: { 
        y: { beginAtZero: false, ticks: { color: '#999' } },
        x: { ticks: { color: '#999' } }
      } 
    }
  });
  
  document.getElementById('modal').style.display = 'block';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

// YOUR M-PESA + AUTH CODE FROM SCREENSHOT

    const res = await fetch('/api/pay', {

      })

if(token){
  fetch('/api/me',{
    headers:{ Authorization: token }
  })
 .then(r=>r.json())
 .then(d=>{
    if(d.username){
      showApp(d.username);
    }
  });
}

function showApp(username) {
  // Your app logic here
  console.log('Logged in as:', username);
}

loadOpps();
setInterval(loadOpps, 10000); // Refresh every 10s
</script>

</body>
</html>
