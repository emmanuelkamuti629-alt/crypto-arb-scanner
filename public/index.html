<!DOCTYPE html>
<html>
<head>
    <title>ARBIMINE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0f172a; font-family: Arial; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 10px; width: 300px; }
        h1 { color: #facc15; text-align: center; margin: 0 0 10px; }
        p { text-align: center; color: #94a3b8; margin: 0 0 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #facc15; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .toggle { text-align: center; color: #facc15; margin-top: 15px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>ARBIMINE</h1>
        <p>FIND. ANALYZE. PROFIT.</p>
        
        <!-- LOGIN FORM -->
        <div id="loginForm">
            <input id="loginUser" placeholder="Username">
            <input id="loginPass" type="password" placeholder="Password">
            <button onclick="login()">LOGIN</button>
            <div class="toggle" onclick="showSignup()">Create Account</div>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" class="hidden">
            <input id="signUser" placeholder="Username">
            <input id="signEmail" placeholder="Email">
            <input id="signMpesa" placeholder="M-Pesa Number">
            <input id="signPass" type="password" placeholder="Password">
            <button onclick="signup()">CREATE ACCOUNT</button>
            <div class="toggle" onclick="showLogin()">Back to Login</div>
        </div>
    </div>

<script>
function showSignup() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('signupForm').classList.remove('hidden');
}
function showLogin() {
    document.getElementById('signupForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
}
async function signup() {
    const res = await fetch('/api/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: document.getElementById('signUser').value,
            email: document.getElementById('signEmail').value,
            mpesa: document.getElementById('signMpesa').value,
            password: document.getElementById('signPass').value
        })
    });
    const data = await res.json();
    if(data.success) location.reload();
    else alert(data.error || 'Signup failed');
}
async function login() {
    const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: document.getElementById('loginUser').value,
            password: document.getElementById('loginPass').value
        })
    });
    const data = await res.json();
    if(data.success) location.reload();
    else alert(data.error || 'Login failed');
}
</script>
</body>
</html>
