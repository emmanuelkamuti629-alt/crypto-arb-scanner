<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1A1A1A; color: white; padding-bottom: 80px; }
        .gold-bg { background-color: #FFD700; }
        .gold-text { color: #FFD700; }
        .card { background-color: #262626; border-radius: 8px; }
    </style>
</head>
<body class="p-4">

    <!-- Header -->
    <div class="flex justify-between items-center mb-4">

        <div class="flex gap-4 text-xl">
            <span>?</span> <span>Y</span> <span>↻</span>
        </div>
    </div>

    <!-- Signup Links Bar -->
    <div class="bg-[#262626] p-2 rounded-full text-center text-sm mb-4 border border-gray-600">
        🔗 EXCHANGE SIGNUP LINKS

    <!-- Scanner List -->
    <div class="grid gap-3">
        <!-- Example Entry -->
        <div class="card p-3 flex justify-between items-center">
            <div class="flex flex-col gap-1 text-[10px]">
                <span class="bg-black p-1 rounded text-white">BUY CoinEx</span>
                <span class="bg-black p-1 rounded text-white">SELL ByBit</span>
            </div>
            <div class="text-center">
                <p class="font-bold">MAJOR/USDT</p>
                <p class="text-[10px] text-gray-400">Liquidity $70</p>
                <p class="text-[10px] text-[#FFD700]">Last Verified 15 seconds ago</p>
            </div>
            <div class="text-[#00FF00] font-bold text-lg">1.6%</div>
        </div>
    </div>

    <!-- Bottom Navigation (As requested: Home, Go PRO, Chat Room) -->
    <div class="fixed bottom-0 left-0 w-full bg-[#FFD700] p-3 flex justify-around text-black font-bold text-xs z-50">
        <a href="index.html" class="flex flex-col items-center">🏠 Home</a>
        <a href="pro.html" class="flex flex-col items-center">★ Go PRO</a>
        <a href="chat.html" class="flex flex-col items-center">💬 Chat Room</a>
    </div>

</body>
</html>
