<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArbiMine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-around;
  background:#111a2e;
  padding:12px;
  position:sticky;
  top:0;
}

.nav button{
  background:none;
  border:none;
  color:#aaa;
  font-size:14px;
  cursor:pointer;
}

.nav button.active{
  color:#00ff99;
  border-bottom:2px solid #00ff99;
}

/* SECTIONS */
.section{
  display:none;
  padding:15px;
}

.section.active{
  display:block;
}

/* CARD */
.card{
  background:#121c33;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

.symbol{
  font-size:16px;
  font-weight:bold;
  color:#00ff99;
}

.row{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-top:6px;
  color:#ccc;
}

.badge{
  padding:3px 6px;
  border-radius:5px;
  font-size:12px;
}

.green{background:#0f5132;color:#00ff99;}
.red{background:#5a1a1a;color:#ff5c5c;}
.blue{background:#1a2a5a;color:#5cb3ff;}

.networks{
  font-size:11px;
  color:#aaa;
  margin-top:8px;
}

.loading{
  text-align:center;
  color:#777;
  padding:20px;
}
</style>
</head>

<body>

<div class="nav">
  <button class="active" onclick="tab('home',event)">Home</button>
  <button onclick="tab('opps',event)">Opportunities</button>
  <button onclick="tab('pro',event)">Pro</button>
  <button onclick="tab('profile',event)">Profile</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <h3>ArbiMine Scanner</h3>
  <p>Live crypto arbitrage opportunities across exchanges.</p>
</div>

<!-- OPPORTUNITIES -->
<div id="opps" class="section">
  <h3>Opportunities</h3>
  <div id="list" class="loading">Loading...</div>
</div>

<!-- PRO -->
<div id="pro" class="section">
  <h3>Pro Plan</h3>
  <p>Upgrade for faster scans & premium alerts.</p>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <h3>Profile</h3>
  <div id="user">Loading...</div>
</div>

<script>

function tab(id,e){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  e.target.classList.add('active');

  if(id === 'opps') loadOpps();
  if(id === 'profile') loadUser();
}

/*
========================
LOAD OPPORTUNITIES
========================
*/
async function loadOpps(){
  const box = document.getElementById('list');
  box.innerHTML = "Loading...";

  try{
    const res = await fetch('/api/opportunities');
    const data = await res.json();

    if(!data.opportunities || data.opportunities.length === 0){
      box.innerHTML = "No opportunities found";
      return;
    }

    box.innerHTML = "";

    data.opportunities.forEach(op => {

      const buyN = (op.buyNetworks || [])
        .map(n => `${n.name}:${n.withdraw ? "✔" : "❌"}`)
        .join(" | ");

      const sellN = (op.sellNetworks || [])
        .map(n => `${n.name}:${n.deposit ? "✔" : "❌"}`)
        .join(" | ");

      const card = document.createElement('div');
      card.className = "card";

      card.innerHTML = `
        <div class="symbol">${op.symbol}</div>

        <div class="row">
          <span>${op.buyExchange}</span>
          <span>${op.buyPrice}</span>
        </div>

        <div class="row">
          <span>${op.sellExchange}</span>
          <span>${op.sellPrice}</span>
        </div>

        <div class="row">
          <span class="badge blue">Spread</span>
          <span class="badge green">${op.spread}%</span>
        </div>

        <div class="row">
          <span>Tradable</span>
          <span class="${op.tradable ? 'green' : 'red'} badge">
            ${op.tradable ? 'YES' : 'NO'}
          </span>
        </div>

        <div class="networks">
          Buy: ${buyN || "N/A"}<br/>
          Sell: ${sellN || "N/A"}
        </div>
      `;

      card.onclick = () => {
        alert(
          `${op.symbol}\nSpread: ${op.spread}%\nBuy: ${op.buyExchange}\nSell: ${op.sellExchange}`
        );
      };

      box.appendChild(card);
    });

  } catch(e){
    box.innerHTML = "Failed to load data";
  }
}

/*
========================
PROFILE
========================
*/
async function loadUser(){
  const box = document.getElementById('user');

  try{
    const token = localStorage.getItem('token');

    const res = await fetch('/api/me',{
      headers:{ Authorization: token }
    });

    const data = await res.json();

    if(data.error){
      box.innerHTML = "Not logged in";
      return;
    }

    box.innerHTML = `
      <p><b>User:</b> ${data.username}</p>
      <p><b>Email:</b> ${data.email}</p>
      <p><b>M-Pesa:</b> ${data.mpesa}</p>
    `;

  }catch(e){
    box.innerHTML = "Error loading profile";
  }
}

</script>

</body>
</html>
