<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArbiMine</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0b0f19;
    color:white;
    padding-bottom:90px;
}

header{
    background:#facc15;
    color:black;
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:bold;
}

/* LOADING */
.loading{
    text-align:center;
    padding:60px;
    color:#94a3b8;
}

/* CARD */
.card{
    background:#111827;
    margin:15px;
    padding:18px;
    border-radius:18px;
    border:1px solid #1f2937;
}

.buy{color:#22c55e;font-weight:bold;}
.sell{color:#ef4444;font-weight:bold;}

.symbol{font-size:28px;margin-top:10px;font-weight:bold;}

.percent{font-size:38px;color:#22c55e;margin-top:10px;}

.badge{
    display:inline-block;
    padding:6px 10px;
    border-radius:10px;
    margin-top:8px;
    font-size:12px;
    font-weight:bold;
    background:#f59e0b;
    color:black;
}

/* RISK COLORS */
.risk-low{color:#22c55e;font-weight:bold;}
.risk-medium{color:#f59e0b;font-weight:bold;}
.risk-high{color:#ef4444;font-weight:bold;}

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#111827;
    border-top:1px solid #1f2937;
}

.bottom-nav button{
    flex:1;
    padding:14px;
    background:none;
    border:none;
    color:#94a3b8;
}

.bottom-nav button.active{
    color:#22c55e;
}

/* DETAILS */
.details{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0b0f19;
    overflow:auto;
    display:none;
    padding:20px;
}

.back{
    background:#ef4444;
    padding:10px;
    border:none;
    color:white;
    border-radius:10px;
    margin-bottom:20px;
}

.detail-card{
    background:#111827;
    padding:20px;
    border-radius:18px;
    margin-bottom:15px;
}

.network{
    background:#1f2937;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

</style>
</head>

<body>

<header>🚀 ArbiMine</header>

<div id="app"></div>

<div class="bottom-nav">
    <button class="active">Home</button>
    <button>Pro</button>
    <button>Profile</button>
</div>

<!-- DETAILS -->
<div id="details" class="details">

    <button class="back" onclick="closeDetails()">← Back</button>

    <div id="detailsBody"></div>

</div>

<script>

const API = "https://crypto-arb-scanner-1.onrender.com";

/* ================= FAST LOADER ================= */

async function fetchWithTimeout(url, ms=12000){

    const controller = new AbortController();
    const id = setTimeout(()=>controller.abort(), ms);

    try{
        const res = await fetch(url,{signal:controller.signal});
        clearTimeout(id);
        return await res.json();
    }catch(e){
        clearTimeout(id);
        return null;
    }
}

/* ================= LOAD OPPS ================= */

async function load(){

    const app = document.getElementById("app");

    app.innerHTML = `<div class="loading">Scanning markets...</div>`;

    const data = await fetchWithTimeout(API+"/api/opportunities", 15000);

    if(!data || !data.opportunities){
        app.innerHTML = `<div class="loading">⚠ Retry loading...</div>`;
        setTimeout(load, 4000);
        return;
    }

    const opps = data.opportunities;

    if(opps.length === 0){
        app.innerHTML = `<div class="loading">No opportunities</div>`;
        return;
    }

    app.innerHTML = opps.map(o=>`

        <div class="card" onclick='openDetails(${JSON.stringify(o)})'>

            <div>
                <span class="buy">BUY</span>
                ${o.buyExchange} $${o.buyPrice}
            </div>

            <div>
                <span class="sell">SELL</span>
                ${o.sellExchange} $${o.sellPrice}
            </div>

            <div class="symbol">${o.symbol}</div>

            <div class="percent">${o.spread}%</div>

            <div>
                Liquidity:
                <b>${o.liquidity}</b>
            </div>

            <div class="
                risk-${o.riskLevel.toLowerCase()}
            ">
                Risk: ${o.riskLevel}
            </div>

            <div>
                Trend: ${o.trend}
            </div>

        </div>

    `).join('');
}

/* ================= DETAILS ================= */

async function openDetails(item){

    document.getElementById("details").style.display="block";

    const data = await fetchWithTimeout(API+"/api/opportunity/"+item.id, 10000);

    const d = data?.data;

    if(!d){
        document.getElementById("detailsBody").innerHTML =
        "<div class='loading'>Failed loading details</div>";
        return;
    }

    document.getElementById("detailsBody").innerHTML = `

        <div class="detail-card">

            <h2>${d.symbol}</h2>

            <p>Buy: ${d.buyExchange} - $${d.buyPrice}</p>
            <p>Sell: ${d.sellExchange} - $${d.sellPrice}</p>

        </div>

        <div class="detail-card">

            <h3>Arrival Time</h3>
            <p>Buy: ${d.arrivalTime.buy} min</p>
            <p>Sell: ${d.arrivalTime.sell} min</p>

        </div>

        <div class="detail-card">

            <h3>Networks</h3>

            <div class="network">ERC20 - Open</div>
            <div class="network">TRC20 - Open</div>

        </div>

        <div class="detail-card">

            <h3>Trend</h3>

            ${d.history.map(h=>`

                <div style="
                    height:${h.spread * 5}px;
                    width:6px;
                    background:#22c55e;
                    display:inline-block;
                    margin-right:2px;
                "></div>

            `).join('')}

        </div>

    `;
}

/* ================= CLOSE ================= */

function closeDetails(){
    document.getElementById("details").style.display="none";
}

/* ================= AUTO REFRESH ================= */

load();
setInterval(load, 20000);

</script>

</body>
</html>
