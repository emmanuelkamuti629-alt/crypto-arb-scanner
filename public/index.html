
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Arbitrage Scanner</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 30px;
            background-color: #1a1a1a;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            border-radius: 5px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        input {
            width: 80%;
            padding: 10px;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1rem;
        }
        button {
            background-color: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 86%;
        }
        button:hover { background-color: #00cc00; }
        #status { margin-top: 15px; color: #ffffff; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ CRYPTO ARBITRAGE SCANNER</h1>
    <p>Unlock Scanner via M-Pesa<br>Fee: KES 100</p>
    <input type="text" id="phone" value="+254728308602" placeholder="Phone Number">
    <button onclick="triggerPayment()">Trigger STK Push</button>
    <div id="status"></div>
</div>

<script>
    async function triggerPayment() {
        const phone = document.getElementById('phone').value;
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Sending STK push... Check phone PIN window.";
        
        try {
            const response = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phoneNumber: phone, amount: 100 })
            });
            const data = await response.json();
            if (response.ok) {
                statusDiv.innerText = "STK Push sent successfully!";
            } else {
                statusDiv.innerText = "Error: " + (data.error || "Failed to trigger push");
            }
        } catch (err) {
            statusDiv.innerText = "Network error connecting to server.";
        }
    }
</script>

</body>
</html>
