<!DOCTYPE html>
<html>
<head>
  <title>ArbiMine</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0d0d0d;
      color:#fff;
      font-family:Arial,sans-serif;
      padding-bottom:80px;
    }

    .header{
      background:#f7b500;
      color:#000;
      text-align:center;
      padding:16px;
      font-size:22px;
      font-weight:800;
      position:sticky;
      top:0;
      z-index:100;
    }

    .container{
      max-width:550px;
      margin:auto;
    }

    .card{
      background:#1a1a1a;
      margin:15px;
      padding:20px;
      border-radius:12px;
    }

    .card h2{
      margin-bottom:15px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:12px;
      border:none;
      border-radius:8px;
      background:#2a2a2a;
      color:#fff;
      font-size:15px;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:8px;
      background:#f7b500;
      color:#000;
      font-weight:700;
      cursor:pointer;
      margin-bottom:10px;
      font-size:15px;
    }

    .btn-secondary{
      background:#333;
      color:#fff;
    }

    .hidden{
      display:none;
    }

    .error{
      background:#f44336;
      padding:10px;
      border-radius:6px;
      margin-bottom:10px;
      display:none;
    }

    .success{
      background:#4caf50;
      color:#000;
      padding:10px;
      border-radius:6px;
      margin-bottom:10px;
      display:none;
    }

    .controls{
      background:#1a1a1a;
      margin:0 15px 10px;
      padding:12px;
      border-radius:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .stats{
      font-size:12px;
      color:#888;
      line-height:1.5;
    }

    .refresh-btn{
      background:#f7b500;
      border:none;
      padding:10px 15px;
      border-radius:6px;
      font-weight:700;
      cursor:pointer;
    }

    .opportunity{
      background:#1a1a1a;
      margin:10px 15px;
      padding:15px;
      border-radius:12px;
      border:1px solid #2a2a2a;
      cursor:pointer;
    }

    .opportunity.expanded{
      border:2px solid #f7b500;
    }

    .opp-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .buy{
      color:#4caf50;
      font-weight:700;
    }

    .sell{
      color:#f44336;
      font-weight:700;
    }

    .symbol{
      font-size:20px;
      font-weight:800;
      margin-top:8px;
    }

    .profit{
      color:#4caf50;
      font-size:26px;
      font-weight:800;
    }

    .liquidity{
      color:#888;
      font-size:12px;
      margin-top:5px;
    }

    .badge{
      font-size:10px;
      padding:4px 8px;
      border-radius:4px;
      margin-left:6px;
      font-weight:700;
    }

    .badge-ok{
      background:#4caf50;
      color:#000;
    }

    .badge-warn{
      background:#ff9800;
      color:#000;
    }

    .badge-bad{
      background:#f44336;
      color:#fff;
    }

    .opp-detail{
      display:none;
      margin-top:15px;
      border-top:1px solid #333;
      padding-top:15px;
    }

    .opp-detail.show{
      display:block;
    }

    .detail-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .detail-box{
      background:#111;
      padding:12px;
      border-radius:8px;
      border:1px solid #333;
    }

    .detail-box h4{
      color:#f7b500;
      margin-bottom:10px;
      font-size:13px;
    }

    .detail-line{
      display:flex;
      justify-content:space-between;
      margin:7px 0;
      font-size:12px;
    }

    .status-ok{
      color:#4caf50;
      font-weight:700;
    }

    .status-bad{
      color:#f44336;
      font-weight:700;
    }

    .status-unknown{
      color:#ff9800;
      font-weight:700;
    }

    .network-tag{
      display:inline-block;
      padding:4px 7px;
      border-radius:5px;
      background:#222;
      font-size:10px;
      margin:2px;
    }

    .network-tag.ok{
      border:1px solid #4caf50;
    }

    .network-tag.bad{
      border:1px solid #f44336;
    }

    .nav{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:#1a1a1a;
      display:flex;
      justify-content:space-around;
      padding:10px 0;
      border-top:1px solid #333;
    }

    .nav-item{
      text-align:center;
      color:#888;
      font-size:12px;
    }

    .nav-item.active{
      color:#f7b500;
    }

  </style>
</head>

<body>

<div class="header">
  🚀 ArbiMine
</div>

<div id="auth-screen" class="container">

  <div class="card">

    <h2>
      Welcome to ArbiMine
    </h2>

    <div id="auth-error" class="error"></div>

    <div id="auth-success" class="success"></div>

    <input id="username" placeholder="Username">

    <input id="email" placeholder="Email">

    <input id="mpesa" placeholder="M-Pesa 2547XXXXXXXX">

    <input id="password" type="password" placeholder="Password">

    <button class="btn" onclick="register()">
      Create Account
    </button>

    <button class="btn btn-secondary" onclick="login()">
      Login
    </button>

  </div>

</div>

<div id="app-screen" class="hidden">

  <div class="container">

    <div class="card">

      <h2 id="welcome-msg">
        Welcome
      </h2>

      <button class="btn btn-secondary" onclick="logout()">
        Logout
      </button>

    </div>

  </div>

  <div class="controls">

    <div class="stats" id="stats">
      Ready
    </div>

    <button class="refresh-btn" onclick="loadArbs()">
      Refresh
    </button>

  </div>

  <div id="list"></div>

</div>

<div class="nav">

  <div class="nav-item active">
    🏠<br>Home
  </div>

  <div class="nav-item">
    ⭐<br>Pro
  </div>

  <div class="nav-item" onclick="logout()">
    👤<br>Logout
  </div>

</div>

<script>

let allOpportunities = [];
let expandedId = null;

function showError(msg){

  const el =
    document.getElementById('auth-error');

  el.innerText = msg;

  el.style.display = 'block';

}

function showSuccess(msg){

  const el =
    document.getElementById('auth-success');

  el.innerText = msg;

  el.style.display = 'block';

}

async function register(){

  const username =
    document.getElementById('username').value.trim();

  const email =
    document.getElementById('email').value.trim();

  const mpesa =
    document.getElementById('mpesa').value.trim();

  const password =
    document.getElementById('password').value;

  try{

    const res =
      await fetch('/api/register',{

        method:'POST',

        headers:{
          'Content-Type':'application/json'
        },

        body:JSON.stringify({
          username,
          email,
          mpesa,
          password
        })

      });

    const data = await res.json();

    if(!res.ok){

      return showError(data.error);

    }

    localStorage.setItem(
      'token',
      data.token
    );

    localStorage.setItem(
      'username',
      data.username
    );

    showSuccess(
      'Account created successfully'
    );

    setTimeout(()=>{

      showApp(data.username);

    },500);

  }catch(e){

    showError('Network error');

  }

}

async function login(){

  const username =
    document.getElementById('username').value.trim();

  const password =
    document.getElementById('password').value;

  try{

    const res =
      await fetch('/api/login',{

        method:'POST',

        headers:{
          'Content-Type':'application/json'
        },

        body:JSON.stringify({
          username,
          password
        })

      });

    const data = await res.json();

    if(!res.ok){

      return showError(data.error);

    }

    localStorage.setItem(
      'token',
      data.token
    );

    localStorage.setItem(
      'username',
      data.username
    );

    showApp(data.username);

  }catch(e){

    showError('Network error');

  }

}

function logout(){

  localStorage.clear();

  location.reload();

}

function showApp(username){

  document
    .getElementById('auth-screen')
    .classList.add('hidden');

  document
    .getElementById('app-screen')
    .classList.remove('hidden');

  document
    .getElementById('welcome-msg')
    .innerText =
      `Welcome, ${username}`;

  loadArbs();

}

function toggleDetail(id){

  const detail =
    document.getElementById(
      `detail-${id}`
    );

  if(expandedId === id){

    detail.classList.remove('show');

    expandedId = null;

    return;

  }

  document
    .querySelectorAll('.opp-detail')
    .forEach(d=>d.classList.remove('show'));

  detail.classList.add('show');

  expandedId = id;

}

function renderOpportunities(){

  const list =
    document.getElementById('list');

  list.innerHTML = '';

  allOpportunities.forEach((opp,idx)=>{

    const id =
      `${opp.symbol}-${idx}`;

    let badge = '';

    if(opp.verified){

      badge =
        `<span class="badge badge-ok">
          TRADEABLE
        </span>`;

    }else if(opp.status_unknown){

      badge =
        `<span class="badge badge-warn">
          UNVERIFIED
        </span>`;

    }else{

      badge =
        `<span class="badge badge-bad">
          DISABLED
        </span>`;

    }

    const div =
      document.createElement('div');

    div.className = 'opportunity';

    div.innerHTML = `

<div onclick="toggleDetail('${id}')">

  <div class="opp-row">

    <div>

      <div>
        <span class="buy">
          BUY
        </span>

        ${opp.buy_at.toUpperCase()}
        $${opp.buy_price}
        <br>

        <span class="sell">
          SELL
        </span>

        ${opp.sell_at.toUpperCase()}
        $${opp.sell_price}
      </div>

      <div class="symbol">
        ${opp.symbol}/USDT
        ${badge}
      </div>

      <div class="liquidity">
        ${opp.exchanges_found} exchanges
      </div>

    </div>

    <div class="profit">
      ${opp.profit_pct}%
    </div>

  </div>

</div>

<div
  class="opp-detail"
  id="detail-${id}"
>

  <div class="detail-grid">

    <div class="detail-box">

      <h4>
        BUY ${opp.buy_at.toUpperCase()}
      </h4>

      <div class="detail-line">
        <span>Liquidity</span>

        <span>
          $${Number(
            opp.buy_liquidity
          ).toLocaleString()}
        </span>
      </div>

      <div class="detail-line">

        <span>Withdraw</span>

        <span class="${
          opp.buy_withdraw_ok
          ? 'status-ok'
          : 'status-bad'
        }">

          ${
            opp.buy_withdraw_ok
            ? 'ENABLED'
            : 'DISABLED'
          }

        </span>

      </div>

      <div class="detail-line">

        <span>Max Buy</span>

        <span>
          $${Number(
            opp.max_buy_usdt
          ).toLocaleString()}
        </span>

      </div>

    </div>

    <div class="detail-box">

      <h4>
        SELL ${opp.sell_at.toUpperCase()}
      </h4>

      <div class="detail-line">
        <span>Liquidity</span>

        <span>
          $${Number(
            opp.sell_liquidity
          ).toLocaleString()}
        </span>
      </div>

      <div class="detail-line">

        <span>Deposit</span>

        <span class="${
          opp.sell_deposit_ok
          ? 'status-ok'
          : 'status-bad'
        }">

          ${
            opp.sell_deposit_ok
            ? 'ENABLED'
            : 'DISABLED'
          }

        </span>

      </div>

      <div class="detail-line">

        <span>Max Sell</span>

        <span>
          $${Number(
            opp.max_sell_usdt
          ).toLocaleString()}
        </span>

      </div>

    </div>

  </div>

  <div
    style="
      margin-top:15px;
      background:#111;
      padding:12px;
      border-radius:8px;
    "
  >

    <div class="detail-line">

      <span>Spread</span>

      <span>
        $${opp.spread_usd}
      </span>

    </div>

    <div class="detail-line">

      <span>First Detected</span>

      <span>
        ${
          opp.first_detected
        }
      </span>

    </div>

  </div>

</div>

`;

    list.appendChild(div);

  });

}

async function loadArbs(){

  try{

    const res =
      await fetch('/api/arbs');

    const data =
      await res.json();

    allOpportunities =
      data.opportunities;

    document
      .getElementById('stats')
      .innerHTML = `
        ${data.count} opportunities
        <br>
        ${data.exchanges_scanned.length} exchanges
      `;

    renderOpportunities();

  }catch(e){

    console.log(e);

  }

}

const token =
  localStorage.getItem('token');

if(token){

  fetch('/api/me',{

    headers:{
      Authorization:token
    }

  })
  .then(r=>r.json())
  .then(data=>{

    if(data.username){

      showApp(data.username);

    }

  });

}

</script>

</body>
</html>
