<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0"/>

<title>ArbiMine</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0f19;
    color:white;
    padding-bottom:90px;
}

header{
    background:#facc15;
    color:black;
    padding:18px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.auth-container{
    padding:20px;
}

.auth-box{
    background:#111827;
    padding:30px;
    border-radius:20px;
    border:1px solid #1f2937;
}

.auth-box h1{
    margin-bottom:25px;
}

.auth-box input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    background:black;
    color:white;
}

.auth-box button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

.create-btn{
    background:#facc15;
    color:black;
}

.login-btn{
    background:#1f2937;
    color:white;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

#opportunities{
    padding:15px;
}

.card{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
}

.buy{
    color:#22c55e;
    font-weight:bold;
}

.sell{
    color:#ef4444;
    font-weight:bold;
}

.symbol{
    font-size:38px;
    font-weight:bold;
    margin-top:15px;
}

.percent{
    color:#22c55e;
    font-size:52px;
    font-weight:bold;
    margin-top:10px;
}

.badge{
    background:#f59e0b;
    color:black;
    padding:8px 12px;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
    display:inline-block;
    margin-top:10px;
}

.tradable{
    background:#22c55e;
}

.warning{
    margin-top:15px;
    background:#f59e0b;
    color:black;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    text-align:center;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111827;
    display:flex;
    justify-content:space-around;
    padding:15px 0;
    border-top:1px solid #1f2937;
}

.bottom-nav button{
    background:none;
    border:none;
    color:#94a3b8;
    font-size:14px;
}

.bottom-nav button.active{
    color:#22c55e;
}

.profile-card{
    background:#111827;
    margin:20px;
    padding:25px;
    border-radius:20px;
}

.profile-card h2{
    margin-bottom:20px;
}

.profile-item{
    margin-bottom:20px;
}

.logout-btn{
    width:100%;
    background:#ef4444;
    color:white;
    padding:15px;
    border:none;
    border-radius:12px;
    font-weight:bold;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    z-index:999;
    overflow:auto;
    padding:20px;
}

.modal-content{
    background:#111827;
    padding:25px;
    border-radius:20px;
}

.close{
    float:right;
    font-size:30px;
    cursor:pointer;
}

.network{
    background:#1f2937;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

.plan{
    background:#111827;
    margin:20px;
    padding:25px;
    border-radius:20px;
}

.plan p{
    color:#22c55e;
    font-size:35px;
    font-weight:bold;
    margin:15px 0;
}

.plan input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    background:black;
    color:white;
}

.plan button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:black;
    font-weight:bold;
}

.graph-bar{
    height:12px;
    background:#22c55e;
    margin-top:10px;
    border-radius:20px;
}

</style>

</head>

<body>

<header>

🚀 ArbiMine

</header>

<!-- AUTH -->

<div id="authPage"
     class="auth-container">

    <div class="auth-box">

        <h1>
            Welcome to ArbiMine
        </h1>

        <input type="text"
               id="username"
               placeholder="Username">

        <input type="email"
               id="email"
               placeholder="Email">

        <input type="text"
               id="mpesa"
               placeholder="M-Pesa: 2547XXXXXXXX">

        <input type="password"
               id="password"
               placeholder="Password">

        <button class="create-btn"
                onclick="registerUser()">

            Create Account

        </button>

        <button class="login-btn"
                onclick="loginUser()">

            Login

        </button>

    </div>

</div>

<!-- MAIN -->

<div id="mainApp"
     style="display:none;">

    <!-- HOME -->

    <div id="homePage"
         class="page active">

        <div id="opportunities">

        </div>

    </div>

    <!-- PRO -->

    <div id="proPage"
         class="page">

        <div class="plan">

            <h2>
                Weekly Plan
            </h2>

            <p>
                KES 100
            </p>

            <input type="text"
                   id="weeklyPhone"
                   placeholder="2547XXXXXXXX">

            <button onclick="
                pay(
                    'weekly',
                    100,
                    'weeklyPhone'
                )
            ">

                Pay Weekly

            </button>

        </div>

        <div class="plan">

            <h2>
                Monthly Plan
            </h2>

            <p>
                KES 350
            </p>

            <input type="text"
                   id="monthlyPhone"
                   placeholder="2547XXXXXXXX">

            <button onclick="
                pay(
                    'monthly',
                    350,
                    'monthlyPhone'
                )
            ">

                Pay Monthly

            </button>

        </div>

    </div>

    <!-- PROFILE -->

    <div id="profilePage"
         class="page">

        <div class="profile-card">

            <h2>
                My Profile
            </h2>

            <div class="profile-item">

                Username:

                <h3 id="pUsername"></h3>

            </div>

            <div class="profile-item">

                Email:

                <h3 id="pEmail"></h3>

            </div>

            <div class="profile-item">

                M-Pesa:

                <h3 id="pMpesa"></h3>

            </div>

            <button class="logout-btn"
                    onclick="logoutUser()">

                Logout

            </button>

        </div>

    </div>

    <!-- NAV -->

    <div class="bottom-nav">

        <button class="active"
                onclick="
                switchPage(
                    'homePage',
                    this
                )">

            Home

        </button>

        <button onclick="
            switchPage(
                'proPage',
                this
            )">

            Pro

        </button>

        <button onclick="
            switchPage(
                'profilePage',
                this
            )">

            Profile

        </button>

    </div>

</div>

<!-- DETAILS -->

<div id="detailsModal"
     class="modal">

    <div class="modal-content">

        <span class="close"
              onclick="closeModal()">

            ×

        </span>

        <div id="detailsContent"></div>

    </div>

</div>

<script>

const API =
'https://crypto-arb-scanner-1.onrender.com';

/*
==================================================
REGISTER
==================================================
*/

function registerUser(){

    const user = {

        username:
            document.getElementById(
                'username'
            ).value,

        email:
            document.getElementById(
                'email'
            ).value,

        mpesa:
            document.getElementById(
                'mpesa'
            ).value,

        password:
            document.getElementById(
                'password'
            ).value
    };

    localStorage.setItem(
        'arbimine_user',
        JSON.stringify(user)
    );

    loginUser();
}

/*
==================================================
LOGIN
==================================================
*/

function loginUser(){

    const user =
        JSON.parse(
            localStorage.getItem(
                'arbimine_user'
            )
        );

    if(!user){

        alert(
            'Create account first'
        );

        return;
    }

    document.getElementById(
        'authPage'
    ).style.display = 'none';

    document.getElementById(
        'mainApp'
    ).style.display = 'block';

    document.getElementById(
        'pUsername'
    ).innerText =
        user.username;

    document.getElementById(
        'pEmail'
    ).innerText =
        user.email;

    document.getElementById(
        'pMpesa'
    ).innerText =
        user.mpesa;

    loadOpportunities();
}

/*
==================================================
AUTO LOGIN
==================================================
*/

window.onload = ()=>{

    if(
        localStorage.getItem(
            'arbimine_user'
        )
    ){
        loginUser();
    }
};

/*
==================================================
LOGOUT
==================================================
*/

function logoutUser(){

    localStorage.removeItem(
        'arbimine_user'
    );

    location.reload();
}

/*
==================================================
PAGES
==================================================
*/

function switchPage(
    pageId,
    btn
){

    document
    .querySelectorAll('.page')
    .forEach(page=>{

        page.classList.remove(
            'active'
        );
    });

    document
    .getElementById(pageId)
    .classList.add('active');

    document
    .querySelectorAll(
        '.bottom-nav button'
    )
    .forEach(button=>{

        button.classList.remove(
            'active'
        );
    });

    btn.classList.add('active');
}

/*
==================================================
LOAD OPPS
==================================================
*/

async function loadOpportunities(){

    const res =
        await fetch(
            `${API}/api/opportunities`
        );

    const json =
        await res.json();

    const opps =
        json.opportunities || [];

    const container =
        document.getElementById(
            'opportunities'
        );

    container.innerHTML =
        opps.map(item=>`

        <div class="card"
             onclick='openDetails(
                ${JSON.stringify(item)}
             )'>

            <div>

                <span class="buy">

                    BUY

                </span>

                ${item.buyExchange}

                $${item.buyPrice}

            </div>

            <div style="
                margin-top:8px;
            ">

                <span class="sell">

                    SELL

                </span>

                ${item.sellExchange}

                $${item.sellPrice}

            </div>

            <div class="symbol">

                ${item.symbol}

            </div>

            <div class="
                badge
                ${
                    item.tradable
                    ? 'tradable'
                    : ''
                }
            ">

                ${
                    item.tradable
                    ? 'TRADABLE'
                    : 'UNVERIFIED'
                }

            </div>

            <div class="percent">

                ${item.spread}%

            </div>

        </div>

    `).join('');
}

/*
==================================================
DETAILS
==================================================
*/

async function openDetails(item){

    const res =
        await fetch(
            `${API}/api/opportunity/${item.id}`
        );

    const json =
        await res.json();

    const data =
        json.data;

    document.getElementById(
        'detailsModal'
    ).style.display = 'block';

    document.getElementById(
        'detailsContent'
    ).innerHTML = `

        <h1>

            ${data.symbol}

        </h1>

        <div style="
            margin-top:20px;
        ">

            <h2>
                Buy:
                ${data.buyExchange}
            </h2>

            <p>
                Price:
                $${data.buyPrice}
            </p>

        </div>

        <div style="
            margin-top:20px;
        ">

            <h2>
                Sell:
                ${data.sellExchange}
            </h2>

            <p>
                Price:
                $${data.sellPrice}
            </p>

        </div>

        <div style="
            margin-top:20px;
        ">

            <h2>
                Networks
            </h2>

            ${
                data.networks.buy.map(net=>`

                <div class="network">

                    <strong>
                        ${net.network}
                    </strong>

                    <p>

                        Deposit:
                        ${
                            net.depositEnable
                            ? 'Open'
                            : 'Closed'
                        }

                    </p>

                    <p>

                        Withdraw:
                        ${
                            net.withdrawEnable
                            ? 'Open'
                            : 'Closed'
                        }

                    </p>

                </div>

                `).join('')
            }

        </div>

        <div style="
            margin-top:25px;
        ">

            <h2>
                Spread History
            </h2>

            ${
                data.history.map(h=>`

                <div class="graph-bar"
                     style="
                     width:
                     ${h.spread * 10}px;
                     ">
                </div>

                `).join('')
            }

        </div>

    `;
}

function closeModal(){

    document.getElementById(
        'detailsModal'
    ).style.display = 'none';
}

/*
==================================================
PAY
==================================================
*/

async function pay(
    plan,
    amount,
    inputId
){

    const phone =
        document.getElementById(
            inputId
        ).value;

    const res =
        await fetch(
            `${API}/api/pesapal/pay`,
            {
                method:'POST',

                headers:{
                    'Content-Type':
                    'application/json'
                },

                body:JSON.stringify({

                    phone,
                    amount,
                    plan
                })
            }
        );

    const data =
        await res.json();

    alert(
        data.message
    );
}

setInterval(
    loadOpportunities,
    10000
);

</script>

</body>
</html>
