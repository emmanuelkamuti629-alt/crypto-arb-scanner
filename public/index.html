<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbiMine - Crypto Arbitrage Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/react-modal@3.16.1/dist/react-modal.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;
    ReactModal.setAppElement('#root');

    function App() {
      const [opportunities, setOpportunities] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedOpp, setSelectedOpp] = useState(null);
      const [modalOpen, setModalOpen] = useState(false);
      const [details, setDetails] = useState(null);
      const [detailsLoading, setDetailsLoading] = useState(false);

      const fetchOpps = async () => {
        try {
          const res = await fetch('/api/scan');
          const data = await res.json();
          setOpportunities(data.opportunities || []);
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchOpps();
        const interval = setInterval(fetchOpps, 10000); // refresh every 10s
        return () => clearInterval(interval);
      }, []);

      const openModal = async (opp) => {
        setSelectedOpp(opp);
        setModalOpen(true);
        setDetailsLoading(true);
        try {
          const res = await fetch(`/api/coin-details?coin=${opp.coin}&buyExchange=${opp.buyExchange}&sellExchange=${opp.sellExchange}`);
          const data = await res.json();
          setDetails(data);
        } catch (e) {
          console.error(e);
        } finally {
          setDetailsLoading(false);
        }
      };

      const chartData = selectedOpp?.history?.history?.map(h => ({
        time: new Date(h.time).toLocaleTimeString(),
        spread: h.spread
      })) || [];

      return (
        <div className="p-4 max-w-6xl mx-auto">
          <h1 className="text-3xl font-bold mb-6 text-green-400">ArbiMine Scanner</h1>
          
          {loading? <p>Loading opportunities...</p> : 
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {opportunities.map((opp, i) => (
                <div 
                  key={i} 
                  onClick={() => openModal(opp)}
                  className="bg-gray-800 p-4 rounded-lg border border-gray-700 hover:border-green-500 cursor-pointer transition"
                >
                  <div className="flex justify-between text-sm text-gray-400">
                    <span>BUY {opp.buyExchange}</span>
                    <span>SELL {opp.sellExchange}</span>
                  </div>
                  <div className="flex justify-between text-lg my-2">
                    <span className="text-red-400">${opp.buyPrice}</span>
                    <span className="text-green-400">${opp.sellPrice}</span>
                  </div>
                  <div className="text-center text-xl font-bold">{opp.coin}/USDT</div>
                  <div className="text-center text-2xl text-green-400 font-bold">{opp.spreadPercent}%</div>
                  <div className="text-center text-xs mt-2 text-gray-500">{opp.status}</div>
                </div>
              ))}
            </div>
          }

          <ReactModal 
            isOpen={modalOpen} 
            onRequestClose={() => setModalOpen(false)}
            className="bg-gray-800 p-6 rounded-lg max-w-4xl mx-auto mt-20 outline-none"
            overlayClassName="fixed inset-0 bg-black bg-opacity-75 flex items-start justify-center overflow-auto"
          >
            {selectedOpp && (
              <div>
                <div className="flex justify-between items-start mb-4">
                  <h2 className="text-2xl font-bold text-green-400">{selectedOpp.coin}/USDT Arbitrage</h2>
                  <button onClick={() => setModalOpen(false)} className="text-gray-400 hover:text-white text-2xl">&times;</button>
                </div>
                
                {detailsLoading? <p>Loading execution data...</p> : details && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div className="bg-gray-900 p-4 rounded">
                      <h3 className="text-xl font-bold mb-2 text-red-400">BUY: {details.buy.exchange}</h3>
                      <p>Deposit: {details.buy.depositEnabled? '✅ Enabled' : '❌ Disabled'}</p>
                      <p>Withdraw: {details.buy.withdrawEnabled? '✅ Enabled' : '❌ Disabled'}</p>
                      <p>Networks: {details.buy.networks.join(', ')}</p>
                      <p>Max Buy: ~${details.buy.maxBuy.toFixed(0)}</p>
                      <p>Liquidity: ${details.buy.liquidity.toFixed(0)}</p>
                    </div>
                    <div className="bg-gray-900 p-4 rounded">
                      <h3 className="text-xl font-bold mb-2 text-green-400">SELL: {details.sell.exchange}</h3>
                      <p>Deposit: {details.sell.depositEnabled? '✅ Enabled' : '❌ Disabled'}</p>
                      <p>Withdraw: {details.sell.withdrawEnabled? '✅ Enabled' : '❌ Disabled'}</p>
                      <p>Networks: {details.sell.networks.join(', ')}</p>
                      <p>Max Sell: ~${details.sell.maxSell.toFixed(0)}</p>
                      <p>Liquidity: ${details.sell.liquidity.toFixed(0)}</p>
                    </div>
                  </div>
                )}

                <h3 className="text-xl font-bold mb-2">Spread History</h3>
                <p className="text-sm text-gray-400 mb-2">
                  First seen: {new Date(selectedOpp.history?.firstSeen).toLocaleString()} at {selectedOpp.history?.firstSpread}%
                </p>
                <div className="h-64 bg-gray-900 p-2 rounded">
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={chartData}>
                      <XAxis dataKey="time" stroke="#9ca3af" />
                      <YAxis stroke="#9ca3af" unit="%" />
                      <Tooltip contentStyle={{ backgroundColor: '#1f2937', border: 'none' }} />
                      <Line type="monotone" dataKey="spread" stroke="#4ade80" strokeWidth={2} dot={false} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            )}
          </ReactModal>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
