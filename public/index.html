<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArbiMine – Crypto Arbitrage Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0b0f19; color: white; padding-bottom: 90px; }
        header { background: #facc15; color: black; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 24px; }
        .refresh-btn { background: black; color: #facc15; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .controls { background: #111827; margin: 15px; padding: 15px; border-radius: 20px; border: 1px solid #1f2937; }
        .control-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 15px; align-items: center; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 12px; color: #94a3b8; }
        select, input[type="range"] { padding: 8px; border-radius: 12px; background: black; color: white; border: 1px solid #1f2937; }
        .exchange-checkboxes { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
        .exchange-checkboxes label { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        .auth-container, .page { /* same as before */ }
        /* reuse your existing styles for cards, etc. */
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 24px; padding: 22px; margin-bottom: 20px; cursor: pointer; }
        .buy { color: #22c55e; }
        .sell { color: #ef4444; }
        .symbol { font-size: 36px; font-weight: bold; margin: 10px 0; }
        .percent { font-size: 40px; font-weight: bold; color: #22c55e; }
        .badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .tradable { background: #22c55e; color: black; }
        .unverified { background: #f97316; color: black; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111827; display: flex; justify-content: space-around; padding: 12px; }
        .bottom-nav button { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 16px; }
        .bottom-nav button.active { color: #22c55e; }
        .details-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0f19; z-index: 9999; overflow: auto; padding: 20px; display: none; }
        .back-btn { background: #ef4444; border: none; padding: 12px 20px; border-radius: 30px; color: white; margin-bottom: 20px; cursor: pointer; }
        .network-item { background: #1f2937; padding: 12px; border-radius: 16px; margin-top: 10px; }
        .graph-bar-container { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
        .graph-bar { height: 10px; background: #22c55e; border-radius: 10px; }
        .loading-screen { text-align: center; padding: 60px 20px; }
    </style>
</head>
<body>

<header>
    <h1>🚀 ArbiMine</h1>
    <button class="refresh-btn" onclick="loadOpportunities()">🔄 Refresh</button>
</header>

<!-- AUTH PAGE (simplified, same as before) -->
<div id="authPage" class="auth-container" style="display: block;">
    <div class="auth-box">
        <h2>Welcome</h2>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="text" id="mpesa" placeholder="M-Pesa: 2547..."><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="registerUser()">Create Account</button>
        <button onclick="loginUser()">Login</button>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display: none;">
    <!-- FILTER CONTROLS -->
    <div class="controls">
        <div class="control-row">
            <div class="control-group">
                <label>Min Profit %</label>
                <input type="range" id="minProfitSlider" min="0.1" max="20" step="0.1" value="0.5">
                <span id="profitValue">0.5%</span>
            </div>
            <div class="control-group">
                <label>Sort By</label>
                <select id="sortBy">
                    <option value="profit">Highest Profit</option>
                    <option value="liquidity">Highest Liquidity</option>
                    <option value="symbol">Symbol A-Z</option>
                </select>
            </div>
        </div>
        <div class="control-group">
            <label>Exclude Exchanges</label>
            <div class="exchange-checkboxes" id="exchangeCheckboxes"></div>
        </div>
    </div>

    <!-- OPPORTUNITIES LIST -->
    <div id="opportunities"></div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button class="active" onclick="switchPage('homePage', this)">🏠 Home</button>
        <button onclick="switchPage('proPage', this)">💎 Pro</button>
        <button onclick="switchPage('profilePage', this)">👤 Profile</button>
    </div>

    <!-- PRO PAGE -->
    <div id="proPage" class="page" style="display: none;">
        <div class="plan" style="background:#111827; margin:20px; padding:20px; border-radius:24px;">
            <h3>Weekly Plan – KES 100</h3>
            <input type="text" id="weeklyPhone" placeholder="2547XXXXXXXX"><br>
            <button onclick="pay('weekly', 100, 'weeklyPhone')">Pay Weekly</button>
        </div>
        <div class="plan" style="background:#111827; margin:20px; padding:20px; border-radius:24px;">
            <h3>Monthly Plan – KES 350</h3>
            <input type="text" id="monthlyPhone" placeholder="2547XXXXXXXX"><br>
            <button onclick="pay('monthly', 350, 'monthlyPhone')">Pay Monthly</button>
        </div>
    </div>

    <!-- PROFILE PAGE -->
    <div id="profilePage" class="page" style="display: none;">
        <div class="profile-card" style="background:#111827; margin:20px; padding:20px;">
            <h3>My Profile</h3>
            <p>Username: <strong id="pUsername"></strong></p>
            <p>Email: <strong id="pEmail"></strong></p>
            <p>M-Pesa: <strong id="pMpesa"></strong></p>
            <button onclick="logoutUser()">Logout</button>
        </div>
    </div>
</div>

<!-- DETAILS OVERLAY -->
<div id="detailsPage" class="details-page">
    <button class="back-btn" onclick="closeDetails()">← Back</button>
    <div id="detailsBody"></div>
</div>

<script>
    const API = 'https://crypto-arb-scanner-1.onrender.com';
    let allExchanges = [];

    // ----------------------------- AUTH (local) -----------------------------
    function registerUser() {
        const user = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            mpesa: document.getElementById('mpesa').value,
            password: document.getElementById('password').value
        };
        if (!user.username || !user.email || !user.mpesa || !user.password) return alert('Fill all fields');
        localStorage.setItem('arbimine_user', JSON.stringify(user));
        loginUser();
    }
    function loginUser() {
        const user = JSON.parse(localStorage.getItem('arbimine_user'));
        if (!user) return alert('Create account first');
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('pUsername').innerText = user.username;
        document.getElementById('pEmail').innerText = user.email;
        document.getElementById('pMpesa').innerText = user.mpesa;
        loadOpportunities();
        initExchangeCheckboxes();
    }
    window.onload = () => { if (localStorage.getItem('arbimine_user')) loginUser(); };
    function logoutUser() { localStorage.removeItem('arbimine_user'); location.reload(); }
    function switchPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId).style.display = 'block';
        document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // ----------------------------- EXCHANGE CHECKBOXES -----------------------------
    function initExchangeCheckboxes() {
        const container = document.getElementById('exchangeCheckboxes');
        const exchanges = ['mexc','kucoin','bitmart','bitget','gateio','okx','bybit','htx','bitfinex','poloniex','cryptocom','upbit'];
        allExchanges = exchanges;
        container.innerHTML = exchanges.map(ex => `
            <label>
                <input type="checkbox" value="${ex}" class="exchange-exclude"> ${ex.toUpperCase()}
            </label>
        `).join('');
    }

    function getExcludeParam() {
        const checked = Array.from(document.querySelectorAll('.exchange-exclude:checked')).map(cb => cb.value);
        return checked.join(',');
    }

    // ----------------------------- LOAD OPPORTUNITIES with filters -----------------------------
    async function loadOpportunities() {
        const minProfit = document.getElementById('minProfitSlider').value;
        document.getElementById('profitValue').innerText = minProfit + '%';
        const exclude = getExcludeParam();
        const sortBy = document.getElementById('sortBy').value;
        const url = `${API}/api/opportunities?minProfit=${minProfit}&exclude=${exclude}&sortBy=${sortBy}`;

        const container = document.getElementById('opportunities');
        container.innerHTML = `<div class="loading-screen">🚀 Scanning markets...</div>`;
        try {
            const res = await fetch(url);
            const json = await res.json();
            const opps = json.opportunities || [];
            if (opps.length === 0) {
                container.innerHTML = `<div class="loading-screen">⚠️ No opportunities with ${minProfit}%+ profit</div>`;
                return;
            }
            container.innerHTML = opps.map(item => `
                <div class="card" onclick='openDetails(${JSON.stringify(item)})'>
                    <div><span class="buy">BUY</span> ${item.buyExchange} $${item.buyPrice}</div>
                    <div><span class="sell">SELL</span> ${item.sellExchange} $${item.sellPrice}</div>
                    <div class="symbol">${item.symbol}</div>
                    <div class="badge ${item.tradable ? 'tradable' : 'unverified'}">
                        ${item.tradable ? 'TRADABLE ✅' : 'UNVERIFIED ⚠️'}
                    </div>
                    <div class="percent">${item.spread}%</div>
                </div>
            `).join('');
        } catch(err) {
            container.innerHTML = `<div class="loading-screen">❌ Failed to load</div>`;
        }
    }

    // Slider live update
    document.getElementById('minProfitSlider')?.addEventListener('input', (e) => {
        document.getElementById('profitValue').innerText = e.target.value + '%';
    });

    // ----------------------------- DETAILS (unchanged but uses new fields) -----------------------------
    function openDetails(item) {
        const page = document.getElementById('detailsPage');
        const body = document.getElementById('detailsBody');
        page.style.display = 'block';
        const history = item.history || [];
        let firstFound = history[0] ? new Date(history[0].time).toLocaleString() : '—';
        let trendHtml = '';
        if (history.length > 1) {
            const diff = history[history.length-1].spread - history[0].spread;
            trendHtml = `<p>Trend: ${diff >=0 ? '📈 increasing' : '📉 decreasing'} (${diff.toFixed(2)}%)</p>`;
        }
        const graphBars = history.map(h => {
            const width = Math.min(100, h.spread * 5);
            return `<div class="graph-bar-container"><span style="width:60px">${new Date(h.time).toLocaleTimeString()}</span><div class="graph-bar" style="width:${width}px"></div><span>${h.spread}%</span></div>`;
        }).join('');
        const buyNetworksHtml = (item.buyNetworks || []).map(n => `<div class="network-item"><b>${n.name}</b><br>Deposit: ${n.deposit ? '✅' : '❌'} | Withdraw: ${n.withdraw ? '✅' : '❌'}<br>Min: ${n.minWithdraw || '?'} | Fee: ${n.fee}<br>Arrival: ${n.arrivalTime}</div>`).join('');
        const sellNetworksHtml = (item.sellNetworks || []).map(n => `<div class="network-item"><b>${n.name}</b><br>Deposit: ${n.deposit ? '✅' : '❌'} | Withdraw: ${n.withdraw ? '✅' : '❌'}<br>Min: ${n.minDeposit || '?'} | Fee: ${n.fee}<br>Arrival: ${n.arrivalTime}</div>`).join('');
        body.innerHTML = `
            <div class="detail-card">
                <h2>${item.symbol}</h2>
                <div class="badge ${item.tradable ? 'tradable' : 'unverified'}">${item.tradingStatus}</div>
                ${!item.tradable ? `<p style="color:#facc15">⚠️ ${item.unverifiedMessage}</p>` : ''}
                <h3>Buy: ${item.buyExchange}</h3>
                <p>Price: $${item.buyPrice} | Withdraw: ${item.buyWithdraw ? '✅' : '❌'}</p>
                <p>Liquidity: $${item.buyLiquidity} | Min Buy: ${item.buyMinAmount} (≈ $${item.buyMinUSDT})</p>
                <h3>Sell: ${item.sellExchange}</h3>
                <p>Price: $${item.sellPrice} | Deposit: ${item.sellDeposit ? '✅' : '❌'}</p>
                <p>Liquidity: $${item.sellLiquidity} | Min Sell: ${item.sellMinAmount} (≈ $${item.sellMinUSDT})</p>
            </div>
            <div class="detail-card">
                <h3>Networks (${item.buyExchange})</h3>
                ${buyNetworksHtml || '<p>No network data</p>'}
                <h3>Networks (${item.sellExchange})</h3>
                ${sellNetworksHtml || '<p>No network data</p>'}
            </div>
            <div class="detail-card">
                <h3>History & Trend</h3>
                <p>First found: ${firstFound}</p>
                ${trendHtml}
                ${graphBars || '<p>No history yet</p>'}
            </div>
        `;
    }
    function closeDetails() { document.getElementById('detailsPage').style.display = 'none'; }

    // ----------------------------- PAYHERO INTEGRATION -----------------------------
    async function pay(plan, amount, inputId) {
        const phone = document.getElementById(inputId).value;
        if (!phone) return alert('Enter M-Pesa number');
        try {
            const res = await fetch(`${API}/api/pesapal/pay`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, amount, plan })
            });
            const data = await res.json();
            if (data.success) alert(`✅ ${data.message}`);
            else alert(`❌ ${data.message}`);
        } catch(err) {
            alert('Payment request failed');
        }
    }

    // Auto-refresh removed – manual only
</script>
</body>
</html>
