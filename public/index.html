<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARBIMINE - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0F172A; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-sm bg-[#1E293B] p-8 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-bold text-center text-[#FFD700] mb-2">ARBIMINE</h1>
        <p class="text-center text-gray-400 mb-8">FIND. ANALYZE. PROFIT.</p>

        <form id="authForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required 
                class="w-full p-3 rounded-lg bg-[#0F172A] border border-gray-600 focus:border-[#FFD700] outline-none">
            
            <input type="password" id="password" placeholder="Password" required 
                class="w-full p-3 rounded-lg bg-[#0F172A] border border-gray-600 focus:border-[#FFD700] outline-none">
            
            <button type="submit" id="mainButton" 
                class="w-full bg-[#FFD700] text-black font-bold py-3 rounded-lg">LOGIN</button>
        </form>

        <div class="mt-6 text-center">
            <button onclick="toggleMode()" id="toggleBtn" class="text-[#FFD700] text-sm">Create Account</button>
        </div>
    </div>

    <script>
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('mainButton').innerText = isLogin ? 'LOGIN' : 'CREATE ACCOUNT';
            document.getElementById('toggleBtn').innerText = isLogin ? 'Create Account' : 'Back to Login';
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? '/api/login' : '/api/register';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (data.success) {
                    window.location.href = '/dashboard.html'; 
                } else {
                    alert(data.message || 'Authentication failed');
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            }
        });
    </script>
</body>
</html>
