<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArbiMine</title>

<style>

body{background:#0b0f19;color:white;font-family:Arial;margin:0;}

header{background:#facc15;color:black;padding:15px;text-align:center;font-size:26px;font-weight:bold;}

.page{display:none;padding:10px;}
.page.active{display:block;}

.card{background:#111827;margin:10px;padding:15px;border-radius:15px;}

.buy{color:#22c55e;}
.sell{color:#ef4444;}

.nav{
position:fixed;bottom:0;width:100%;display:flex;background:#111827;
}

.nav button{flex:1;padding:15px;background:none;border:none;color:white;}

.liq-high{color:#22c55e;}
.liq-medium{color:#f59e0b;}
.liq-low{color:#ef4444;}

.r-green{color:#22c55e;}
.r-orange{color:#f59e0b;}
.r-red{color:#ef4444;}

</style>

</head>

<body>

<header>🚀 ArbiMine</header>

<div id="home" class="page active"></div>
<div id="pro" class="page">PRO PAGE</div>
<div id="profile" class="page">PROFILE PAGE</div>

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('pro')">Pro</button>
<button onclick="show('profile')">Profile</button>
</div>

<script>

const API="https://crypto-arb-scanner-1.onrender.com";

function show(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

}

async function load(){

const res=await fetch(API+"/api/opportunities");
const data=await res.json();

document.getElementById("home").innerHTML=
data.opportunities.map(o=>`

<div class="card">

<div class="buy">BUY ${o.buyExchange} ${o.buyPrice}</div>
<div class="sell">SELL ${o.sellExchange} ${o.sellPrice}</div>

<h2>${o.symbol}</h2>

<p>${o.spread}%</p>

<p class="liq-${o.liquidity.label.toLowerCase()}">
Liquidity: ${o.liquidity.label}
</p>

<p class="r-${o.risk.level.toLowerCase()}">
Risk: ${o.risk.level}
</p>

</div>

`).join("");

}

load();
setInterval(load,15000);

</script>

</body>
</html>
