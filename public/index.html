<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArbiMine</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0f19;
    color:white;
    padding-bottom:90px;
}

header{
    background:#facc15;
    color:black;
    padding:18px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

/* AUTH */
.auth-container{padding:20px;}
.auth-box{background:#111827;padding:30px;border-radius:24px;}
.auth-box input{
    width:100%;
    padding:18px;
    margin-bottom:15px;
    border:none;
    border-radius:14px;
    background:black;
    color:white;
}
.auth-box button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    font-weight:bold;
}
.create-btn{background:#facc15;}
.login-btn{background:#1f2937;color:white;}

.page{display:none;}
.page.active{display:block;}

.loading-screen{text-align:center;padding:60px;}
.rocket{font-size:40px;animation:fly 2s linear infinite;}
@keyframes fly{from{transform:translateX(-100px);}to{transform:translateX(100vw);}}

.card{
    background:#111827;
    margin:15px;
    padding:20px;
    border-radius:20px;
    border:1px solid #1f2937;
}

.buy{color:#22c55e;font-weight:bold;}
.sell{color:#ef4444;font-weight:bold;}

.symbol{font-size:30px;margin-top:10px;font-weight:bold;}

.percent{font-size:40px;color:#22c55e;margin-top:10px;}

.badge{
    display:inline-block;
    padding:6px 12px;
    border-radius:10px;
    margin-top:10px;
    font-size:12px;
    font-weight:bold;
    background:#f59e0b;
    color:black;
}

.tradable{background:#22c55e;}

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#111827;
    border-top:1px solid #1f2937;
}

.bottom-nav button{
    flex:1;
    padding:15px;
    background:none;
    border:none;
    color:#94a3b8;
}

.bottom-nav button.active{color:#22c55e;}

/* DETAILS */
.details-page{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0b0f19;
    overflow:auto;
    display:none;
    padding:20px;
}

.back-btn{
    background:#ef4444;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:20px;
}

.detail-card{
    background:#111827;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.network-item{
    background:#1f2937;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

</style>

</head>

<body>

<header>🚀 ArbiMine</header>

<!-- AUTH -->
<div id="authPage" class="auth-container">
    <div class="auth-box">
        <h2>Login / Register</h2>

        <input id="username" placeholder="Username"/>
        <input id="email" placeholder="Email"/>
        <input id="mpesa" placeholder="M-Pesa"/>
        <input id="password" placeholder="Password"/>

        <button class="create-btn" onclick="loginUser()">Enter</button>
    </div>
</div>

<!-- MAIN -->
<div id="mainApp" style="display:none;">

    <div id="homePage" class="page active">
        <div id="opportunities"></div>
    </div>

    <div id="profilePage" class="page">
        <div class="card">
            <h2>Profile</h2>
            <p id="pUsername"></p>
            <p id="pEmail"></p>
            <p id="pMpesa"></p>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="active" onclick="switchPage('homePage',this)">Home</button>
        <button onclick="switchPage('profilePage',this)">Profile</button>
    </div>
</div>

<!-- DETAILS -->
<div id="detailsPage" class="details-page">

    <button class="back-btn" onclick="closeDetails()">← Back</button>

    <div id="detailsBody"></div>
</div>

<script>

const API = "https://crypto-arb-scanner-1.onrender.com";

/* LOGIN */
function loginUser(){

    const user = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        mpesa: document.getElementById('mpesa').value
    };

    localStorage.setItem("user", JSON.stringify(user));

    document.getElementById("authPage").style.display="none";
    document.getElementById("mainApp").style.display="block";

    document.getElementById("pUsername").innerText = user.username;
    document.getElementById("pEmail").innerText = user.email;
    document.getElementById("pMpesa").innerText = user.mpesa;

    loadOpportunities();
}

/* SWITCH PAGE */
function switchPage(page,btn){

    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");

    document.querySelectorAll(".bottom-nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
}

/* LOAD OPPS */
async function loadOpportunities(){

    const box = document.getElementById("opportunities");

    box.innerHTML = `<div class="loading-screen">🚀 Scanning Markets...</div>`;

    const res = await fetch(API+"/api/opportunities");
    const data = await res.json();

    const opps = data.opportunities || [];

    if(opps.length === 0){
        box.innerHTML = "No opportunities yet";
        return;
    }

    box.innerHTML = opps.map(o=>`

        <div class="card" onclick='openDetails(${JSON.stringify(o)})'>

            <div>
                <span class="buy">BUY</span> ${o.buyExchange} $${o.buyPrice}
            </div>

            <div>
                <span class="sell">SELL</span> ${o.sellExchange} $${o.sellPrice}
            </div>

            <div class="symbol">${o.symbol}</div>

            <div class="percent">${o.spread}%</div>

            <div style="margin-top:10px;">
                Liquidity: <b>${o.liquidity}</b>
            </div>

            <div style="color:${o.risk.color}">
                Risk: <b>${o.risk.level}</b>
            </div>

            <div>
                Trend: <b>${o.trend}</b>
            </div>

        </div>

    `).join('');
}

/* DETAILS */
async function openDetails(item){

    document.getElementById("detailsPage").style.display="block";

    const res = await fetch(API+"/api/opportunity/"+item.id);
    const d = await res.json();

    const data = d.data;

    document.getElementById("detailsBody").innerHTML = `

        <div class="detail-card">

            <h2>${data.symbol}</h2>

            <p>Buy: ${data.buyExchange} - $${data.buyPrice}</p>
            <p>Sell: ${data.sellExchange} - $${data.sellPrice}</p>

            <p>Arrival Buy: ${data.arrivalTime.buy} min</p>
            <p>Arrival Sell: ${data.arrivalTime.sell} min</p>

        </div>

        <div class="detail-card">

            <h3>Networks</h3>

            ${data.networks.buy.map(n=>`

                <div class="network-item">

                    <b>${n.network}</b><br/>
                    Deposit: ${n.deposit ? "Open":"Closed"}<br/>
                    Withdraw: ${n.withdraw ? "Open":"Closed"}<br/>
                    ETA: ${n.eta}

                </div>

            `).join('')}

        </div>

        <div class="detail-card">

            <h3>Trend Graph</h3>

            <div style="display:flex;align-items:flex-end;height:120px;gap:3px;">

                ${data.history.map(h=>`

                    <div style="
                        width:6px;
                        height:${h.spread * 6}px;
                        background:${h.spread > 5 ? '#ef4444':'#22c55e'};
                    "></div>

                `).join('')}

            </div>

        </div>

    `;
}

/* CLOSE */
function closeDetails(){
    document.getElementById("detailsPage").style.display="none";
}

setInterval(loadOpportunities,15000);

</script>

</body>
</html>
