<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>body { background-color: #1A1A1A; color: white; padding-bottom: 80px; }</style>
</head>
<body class="p-6">

    <h1 class="text-2xl font-bold text-[#FFD700] text-center mb-6">🚀 UPGRADE TO PRO 🚀</h1>
    <p class="text-center text-gray-400 mb-8">Get your PRO Membership Today!</p>

    <div class="flex justify-around gap-4 mb-8">
        <button id="btn-week" onclick="selectPlan('week')" class="w-1/2 p-4 rounded-xl font-bold bg-[#FFD700] text-black transition-all">
            1 week<br>Ksh 100
        </button>
        <button id="btn-month" onclick="selectPlan('month')" class="w-1/2 p-4 rounded-xl font-bold bg-white text-black transition-all">
            1 month<br>Ksh 350
        </button>
    </div>

    <div class="space-y-4">
        <input type="text" id="mpesa-number" placeholder="Enter M-Pesa Number" class="w-full p-4 rounded-lg bg-[#334155] border border-gray-600 text-white">
        <button onclick="payWithPaystack()" class="w-full bg-[#FFD700] text-black font-bold py-4 rounded-lg text-lg">
            PAY NOW
        </button>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-[#FFD700] p-3 flex justify-around text-black font-bold text-xs z-50">
        <a href="index.html" class="flex flex-col items-center">🏠 Home</a>
        <a href="pro.html" class="flex flex-col items-center">★ Go PRO</a>
        <a href="chat.html" class="flex flex-col items-center">💬 Chat Room</a>
        <a href="profile.html" class="flex flex-col items-center">👤 Profile</a>
    </div>

    <script>
        let selectedPlan = 'week';

        function selectPlan(plan) {
            selectedPlan = plan;
            const weekBtn = document.getElementById('btn-week');
            const monthBtn = document.getElementById('btn-month');

            if (plan === 'week') {
                weekBtn.className = "w-1/2 p-4 rounded-xl font-bold bg-[#FFD700] text-black transition-all";
                monthBtn.className = "w-1/2 p-4 rounded-xl font-bold bg-white text-black transition-all";
            } else {
                monthBtn.className = "w-1/2 p-4 rounded-xl font-bold bg-[#FFD700] text-black transition-all";
                weekBtn.className = "w-1/2 p-4 rounded-xl font-bold bg-white text-black transition-all";
            }
        }

        function payWithPaystack() {
            const amount = selectedPlan === 'week' ? 10000 : 35000;
            const email = "user@arbimine.com"; // Replace with dynamic user email

            const handler = PaystackPop.setup({
                key: 'pk_live_e1a97839bc3dee4a9be7412ac4e5602fe1fec808', // Replace with your actual Paystack Public Key
                email: email,
                amount: amount,
                currency: 'KES',
                callback: function(response) {
                    alert('Payment successful! Reference: ' + response.reference);
                },
                onClose: function() {
                    alert('Transaction cancelled.');
                }
            });
            handler.openIframe();
        }
    </script>
</body>
</html>
