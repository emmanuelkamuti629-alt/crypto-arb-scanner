<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay KES 100</title>
    <script src="https://js.paystack.co/v2/inline.js"></script>
</head>
<body>

    <h1>Pay KES 100</h1>
    <input type="tel" id="phone" placeholder="Enter M-Pesa Number (e.g. 07XXXXXXXX)" required>
    <button id="pay-button">Pay with M-Pesa</button>

    <script>
        document.getElementById('pay-button').addEventListener('click', async () => {
            const phone = document.getElementById('phone').value;
            if (!phone) return alert("Please enter your M-Pesa number");

            try {
                // Backend call
                const response = await fetch('/api/pay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: "user@example.com", amount: 100 })
                });
                const result = await response.json();

                if (result.status) {
                    const popup = new Paystack();
                    popup.checkout({
                        key: 'pk_live_YOUR_PUBLIC_KEY', 
                        email: 'user@example.com',
                        amount: 100 * 100,
                        ref: result.data.reference,
                        channels: ['mobile_money'],
                        // Pass the mobile number to trigger M-Pesa automatically
                        metadata: {
                            custom_fields: [{ display_name: "Mobile Number", variable_name: "mobile_number", value: phone }]
                        },
                        callback: (res) => alert('Payment successful! Ref: ' + res.reference),
                        onClose: () => alert('Transaction cancelled')
                    });
                }
            } catch (err) { alert('Error: ' + err.message); }
        });
    </script>
</body>
</html>
